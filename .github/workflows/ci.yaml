name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

  workflow_dispatch:

# I think I should make the OSs a matrix but it's beyond my current knowledge
# See this link for gcc selector: https://github.com/actions/virtual-environments/issues/2503

jobs:
  test-multi-OS-installation:
    name: "Test installation on ${{matrix.os}} with Python ${{matrix.python-version}}"
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-20.04, ubuntu-18.04, macos-11, macos-10.15]
        python-version: [3.9]
        include:
          - runs-on: macos-11
            compiler: gcc
            gcc: 10
          - runs-on: macos-10.15
            compiler: gcc
            gcc: 10

    steps:
      - uses: actions/checkout@v2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v2
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pyDISORT
        run: |
          python -m pip install .

      - name: Test the installation
        run: |
          python -c "import disort; print(disort.disort.__doc__)"

