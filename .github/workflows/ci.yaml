name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

  workflow_dispatch:

# I think I should make the OSs a matrix but it's beyond my current knowledge
# See this link for gcc selector: https://github.com/actions/virtual-environments/issues/2503

jobs:
  test-install-ubuntu-20-04:
    name: "Test installation on Ubuntu 20.04 with Python ${{matrix.python-version}}"
    runs-on: ubuntu-20.04

    strategy:
      fail-fast: false
      matrix:
        python-version: [ 3.9 ]

    steps:
      - uses: actions/checkout@v2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v2
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pyDISORT
        run: |
          python -m pip install .

      - name: Test the installation
        run: |
          python -c "import disort; print(disort.disort.__doc__)"

  test-install-ubuntu-18-04:
    name: "Test installation on Ubuntu 18.04 with Python ${{matrix.python-version}}"
